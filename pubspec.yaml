name: outtadebt
description: A new Flutter project.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ^3.9.0
  flutter: ">=3.41.1"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  logging: ^1.2.0
  http: ^1.3.0
  cronet_http: ^1.3.3
  cupertino_http: ^2.1.0
  go_router: ^16.2.0
  shared_preferences: ^2.3.5
  lottie: ^3.3.1
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0
  fl_chart: ^0.70.2
  flutter_svg: ^2.0.17
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/outtadebt_logo.svg
    - assets/images/outtadebt_app_icon.svg
    - assets/animations/
